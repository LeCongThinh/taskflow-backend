services:
  postgre:
    image: postgres:16
    container_name: taskflow-postgre
    restart: unless-stopped
    environment:
      - POSTGRES_DB=taskflow_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASS=123456
    ports:
      - "5432:5432"
    volumes:
      - taskflow_pgdata:/var/lib/postgresql/data
volumes:
  taskflow_pgdata:
